<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Ivan Legchilov — UX/UI Designer</title>
    <meta name="description" content="Ivan Legchilov — UX/UI Designer. Interactive website coming soon." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Space+Grotesk:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      @keyframes revealUp {
        from { opacity: 0; transform: translateY(30px); filter: blur(8px); }
        to   { opacity: 1; transform: translateY(0); filter: blur(0); }
      }

      @keyframes clipReveal {
        from { clip-path: inset(0 100% 0 0); opacity: 0; }
        40%  { opacity: 1; }
        to   { clip-path: inset(0 0% 0 0); opacity: 1; }
      }

      @keyframes growLine {
        from { transform: scaleX(0); opacity: 0; }
        to   { transform: scaleX(1); opacity: 1; }
      }

      @keyframes fadeScale {
        from { opacity: 0; transform: scale(0.92); filter: blur(4px); }
        to   { opacity: 1; transform: scale(1); filter: blur(0); }
      }

      :root {
        --mx: 50vw;
        --my: 50vh;
      }

      body {
        min-height: 100svh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-family: "Space Grotesk", sans-serif;
        background: #080808;
        color: #d4d4d4;
        overflow: hidden;
        -webkit-font-smoothing: antialiased;
      }

      /* Base custom cursor rule */
      @media (pointer: fine) {
        * { cursor: none !important; }
      }

      /* Custom cursor elements */
      .cursor-dot {
        position: fixed;
        top: 0; left: 0;
        width: 6px; height: 6px;
        background: #f0f0f0;
        border-radius: 50%;
        transform: translate(-50%, -50%);
        pointer-events: none;
        z-index: 9999;
        transition: opacity 0.3s;
      }

      .cursor-trail {
        position: fixed;
        top: 0; left: 0;
        width: 40px; height: 40px;
        border: 1px solid rgba(255, 255, 255, 0.25);
        border-radius: 50%;
        transform: translate(-50%, -50%);
        pointer-events: none;
        z-index: 9998;
        backdrop-filter: blur(0px); /* Initialize blur to allow transition */
        -webkit-backdrop-filter: blur(0px);
        transition: width 0.3s cubic-bezier(0.23, 1, 0.32, 1),
                    height 0.3s cubic-bezier(0.23, 1, 0.32, 1),
                    background 0.3s,
                    border-color 0.3s,
                    opacity 0.3s,
                    backdrop-filter 0.3s,
                    -webkit-backdrop-filter 0.3s;
      }

      .cursor-trail.hovering {
        width: 0px;
        height: 0px;
        opacity: 0;
      }

      .container {
        position: relative;
        z-index: 1;
        text-align: center;
        padding: 32px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 40px;
      }

      .name {
        font-family: "Instrument Serif", serif;
        font-weight: 400;
        font-size: clamp(2.8rem, 7vw, 5.2rem);
        line-height: 1.15;
        letter-spacing: -0.03em;
        color: #f0f0f0;
        opacity: 0;
        animation: clipReveal 1s cubic-bezier(0.23, 1, 0.32, 1) 0.2s both;
      }

      .role {
        font-size: 0.82rem;
        font-weight: 400;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: #555;
        margin-top: 12px;
        opacity: 0;
        animation: revealUp 0.8s cubic-bezier(0.23, 1, 0.32, 1) 0.7s both;
      }

      .divider {
        width: 40px;
        height: 1px;
        background: #2a2a2a;
        opacity: 0;
        animation: growLine 0.6s ease-out 1.1s both;
      }

      .status {
        font-size: 0.88rem;
        font-weight: 300;
        color: #666;
        letter-spacing: 0.04em;
        opacity: 0;
        animation: revealUp 0.8s cubic-bezier(0.23, 1, 0.32, 1) 1.4s both;
      }

      .status em {
        font-family: "Instrument Serif", serif;
        font-style: italic;
        color: #888;
        font-size: 1rem;
      }

      .links {
        display: flex;
        gap: 12px;
        justify-content: center;
        align-items: center;
        opacity: 0;
        animation: fadeScale 0.9s cubic-bezier(0.23, 1, 0.32, 1) 1.8s both;
      }

      .links a {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 10px 20px;
        border-radius: 999px;
        border: 1px solid #1a1a1a;
        color: #888;
        text-decoration: none;
        font-size: 0.84rem;
        font-weight: 400;
        letter-spacing: 0.02em;
        transition: color 0.3s, border-color 0.3s, background 0.3s, transform 0.3s;
      }

      .links a:hover {
        color: #f0f0f0;
        border-color: #444;
        background: rgba(255,255,255,0.04);
        transform: translateY(-2px);
      }

      .links a:focus-visible {
        outline: 1px solid #444;
        outline-offset: 2px;
      }

      .links svg {
        width: 16px;
        height: 16px;
        fill: currentColor;
        flex-shrink: 0;
      }

      .wave-bg {
        position: fixed;
        inset: 0;
        z-index: -1;
        pointer-events: none;
      }

      @media (max-width: 520px) {
        .container { gap: 32px; padding: 24px; }
        .links { flex-direction: column; gap: 10px; width: 100%; }
        .links a { justify-content: center; width: 100%; }
      }

      @media (pointer: coarse) {
        .cursor-dot, .cursor-trail { display: none !important; }
        .wave-bg { display: none; }
      }

      @media (prefers-reduced-motion: reduce) {
        * { transition: none !important; }
        .cursor-trail { display: none !important; }
        .wave-bg { display: none; }
      }
    </style>
  </head>
  <body>
    <canvas class="wave-bg" aria-hidden="true"></canvas>
    <div class="cursor-dot" aria-hidden="true"></div>
    <div class="cursor-trail" aria-hidden="true"></div>

    <div class="container">
      <header>
        <h1 class="name">Ivan Legchilov</h1>
        <p class="role">UX / UI Designer</p>
      </header>

      <div class="divider" aria-hidden="true"></div>

      <p class="status">Interactive website <em>coming soon</em></p>

      <nav class="links">

          <svg viewBox="0 0 24 24"><path d="M16.969 16.927a2.561 2.561 0 0 0 1.901.677 2.501 2.501 0 0 0 1.531-.475c.362-.235.636-.584.779-.99h2.585a5.091 5.091 0 0 1-1.9 2.896 5.292 5.292 0 0 1-3.091.88 5.839 5.839 0 0 1-2.284-.433 4.871 4.871 0 0 1-1.723-1.211 5.657 5.657 0 0 1-1.08-1.874 7.057 7.057 0 0 1-.383-2.393c-.005-.8.129-1.595.396-2.349a5.313 5.313 0 0 1 5.088-3.604 4.87 4.87 0 0 1 2.376.563c.661.362 1.231.87 1.668 1.485a6.2 6.2 0 0 1 .943 2.133c.194.821.263 1.666.205 2.508h-7.699c-.063.79.184 1.574.688 2.187ZM6.947 4.084a8.065 8.065 0 0 1 1.928.198 4.29 4.29 0 0 1 1.49.638c.418.303.748.711.958 1.182.241.579.357 1.203.341 1.83a3.506 3.506 0 0 1-.506 1.961 3.726 3.726 0 0 1-1.503 1.287 3.588 3.588 0 0 1 2.027 1.437c.464.747.697 1.615.67 2.494a4.593 4.593 0 0 1-.423 2.032 3.945 3.945 0 0 1-1.163 1.413 5.114 5.114 0 0 1-1.683.807 7.135 7.135 0 0 1-1.928.259H0V4.084h6.947Zm-.235 12.9c.308.004.616-.029.916-.099a2.18 2.18 0 0 0 .766-.332c.228-.158.411-.371.534-.619.142-.317.208-.663.191-1.009a2.08 2.08 0 0 0-.642-1.715 2.618 2.618 0 0 0-1.696-.505h-3.54v4.279h3.471Zm13.635-5.967a2.13 2.13 0 0 0-1.654-.619 2.336 2.336 0 0 0-1.163.259 2.474 2.474 0 0 0-.738.62 2.359 2.359 0 0 0-.396.792c-.074.239-.12.485-.137.734h4.769a3.239 3.239 0 0 0-.679-1.785l-.002-.001Zm-13.813-.648a2.254 2.254 0 0 0 1.423-.433c.399-.355.607-.88.56-1.413a1.916 1.916 0 0 0-.178-.891 1.298 1.298 0 0 0-.495-.533 1.851 1.851 0 0 0-.711-.274 3.966 3.966 0 0 0-.835-.073H3.241v3.631h3.293v-.014ZM21.62 5.122h-5.976v1.527h5.976V5.122Z"/></svg>
          Behance

        <a href="https://drive.google.com/file/d/1VtjgxgVY60JA-nO7s712u_z9lcKpUVUk/view" target="_blank" rel="noreferrer">
          <svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm4 18H6V4h7v5h5v11z"/></svg>
          CV

      </nav>
    </div>

    <script>
      (() => {
        if (window.matchMedia("(prefers-reduced-motion: reduce)").matches) return;
        if (window.matchMedia("(pointer: coarse)").matches) return;

        const root = document.documentElement;
        const dot = document.querySelector(".cursor-dot");
        const trail = document.querySelector(".cursor-trail");
        const links = document.querySelectorAll("a");

        let targetX = window.innerWidth / 2;
        let targetY = window.innerHeight / 2;
        let currentX = targetX;
        let currentY = targetY;

        // hide cursors until first move to prevent corner spawn
        if (dot && trail) {
          dot.style.opacity = 0;
          trail.style.opacity = 0;
        }

        let hasMoved = false;

        document.addEventListener("pointermove", (e) => {
          targetX = e.clientX;
          targetY = e.clientY;
          
          if (!hasMoved && dot && trail) {
            hasMoved = true;
            currentX = targetX;
            currentY = targetY;
            dot.style.left = targetX + "px";
            dot.style.top = targetY + "px";
            trail.style.left = targetX + "px";
            trail.style.top = targetY + "px";
            dot.style.opacity = 1;
            trail.style.opacity = 1;
          }
          
          if (dot) {
            dot.style.left = targetX + "px";
            dot.style.top = targetY + "px";
          }
        });

        links.forEach(link => {
          link.addEventListener("mouseenter", () => trail?.classList.add("hovering"));
          link.addEventListener("mouseleave", () => trail?.classList.remove("hovering"));
        });

        const lerp = (a, b, t) => a + (b - a) * t;

        /* ---- webgl fluid wave canvas ---- */
        const canvas = document.querySelector(".wave-bg");
        const gl = canvas.getContext("webgl");

        const vs = gl.createShader(gl.VERTEX_SHADER);
        gl.shaderSource(vs, `attribute vec2 p;void main(){gl_Position=vec4(p,0.,1.);}`);
        gl.compileShader(vs);

        const fs = gl.createShader(gl.FRAGMENT_SHADER);
        gl.shaderSource(fs, `
          precision highp float;
          uniform vec2 u_res;
          uniform float u_time;
          uniform vec2 u_mouse;

          // random hash
          float hash12(vec2 p) {
            vec3 p3  = fract(vec3(p.xyx) * .1031);
            p3 += dot(p3, p3.yzx + 33.33);
            return fract((p3.x + p3.y) * p3.z);
          }

          // smooth noise
          float noise(vec2 p) {
            vec2 i = floor(p);
            vec2 f = fract(p);
            f = f * f * (3.0 - 2.0 * f);
            float a = hash12(i);
            float b = hash12(i + vec2(1.0, 0.0));
            float c = hash12(i + vec2(0.0, 1.0));
            float d = hash12(i + vec2(1.0, 1.0));
            return mix(mix(a, b, f.x), mix(c, d, f.x), f.y);
          }

          // fractal brownian motion
          float fbm(vec2 p) {
            float f = 0.0;
            float amp = 0.5;
            for(int i = 0; i < 4; i++) {
              f += amp * noise(p);
              p *= 2.0;
              amp *= 0.5;
            }
            return f;
          }

          void main() {
            vec2 uv = gl_FragCoord.xy / u_res.xy;
            float aspect = u_res.x / u_res.y;
            uv.x *= aspect;

            vec2 mouse = u_mouse / u_res.xy;
            mouse.x *= aspect;

            // distance to mouse
            float dist = length(uv - mouse);
            
            // soft displacement
            vec2 disp = normalize(uv - mouse) * exp(-dist * 8.0) * 0.05;

            // fluid waves
            vec2 p = uv * 2.0 + disp;
            p.x += u_time * 0.04;
            p.y -= u_time * 0.03;

            float n = fbm(p + fbm(p * 1.5 - u_time * 0.05));

            // premium dark colors
            vec3 col1 = vec3(0.02, 0.02, 0.02);
            vec3 col2 = vec3(0.08, 0.08, 0.09) + (exp(-dist * 4.0) * 0.06);
            vec3 bg = mix(col1, col2, n);

            // dynamic grain
            float grain = (hash12(gl_FragCoord.xy + u_time) - 0.5) * 0.04;

            gl_FragColor = vec4(bg + grain, 1.0);
          }
        `);
        gl.compileShader(fs);

        const prog = gl.createProgram();
        gl.attachShader(prog, vs);
        gl.attachShader(prog, fs);
        gl.linkProgram(prog);
        gl.useProgram(prog);

        const buf = gl.createBuffer();
        gl.bindBuffer(gl.ARRAY_BUFFER, buf);
        gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);

        const pos = gl.getAttribLocation(prog, "p");
        gl.enableVertexAttribArray(pos);
        gl.vertexAttribPointer(pos, 2, gl.FLOAT, false, 0, 0);

        const uRes = gl.getUniformLocation(prog, "u_res");
        const uTime = gl.getUniformLocation(prog, "u_time");
        const uMouse = gl.getUniformLocation(prog, "u_mouse");

        function resize() {
          canvas.width = window.innerWidth;
          canvas.height = window.innerHeight;
          gl.viewport(0, 0, canvas.width, canvas.height);
          gl.uniform2f(uRes, canvas.width, canvas.height);
        }
        resize();
        window.addEventListener("resize", resize);

        let time = 0;
        function tick() {
          currentX = lerp(currentX, targetX, 0.12);
          currentY = lerp(currentY, targetY, 0.12);

          if (trail && hasMoved) {
            trail.style.left = currentX + "px";
            trail.style.top = currentY + "px";
          }

          time += 0.01;
          gl.uniform1f(uTime, time);
          gl.uniform2f(uMouse, currentX, canvas.height - currentY);
          gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

          requestAnimationFrame(tick);
        }

        requestAnimationFrame(tick);
      })();
    </script>
