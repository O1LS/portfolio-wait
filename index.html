<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Ivan Legchilov — UX/UI Designer</title>
    <meta name="description" content="Ivan Legchilov — UX/UI Designer. Interactive website coming soon." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Space+Grotesk:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      @keyframes revealUp {
        from { opacity: 0; transform: translateY(30px); filter: blur(8px); }
        to   { opacity: 1; transform: translateY(0); filter: blur(0); }
      }

      @keyframes clipReveal {
        from { clip-path: inset(0 100% 0 0); opacity: 0; }
        40%  { opacity: 1; }
        to   { clip-path: inset(0 0% 0 0); opacity: 1; }
      }

      @keyframes growLine {
        from { transform: scaleX(0); opacity: 0; }
        to   { transform: scaleX(1); opacity: 1; }
      }

      @keyframes fadeScale {
        from { opacity: 0; transform: scale(0.92); filter: blur(4px); }
        to   { opacity: 1; transform: scale(1); filter: blur(0); }
      }

      :root {
        --mx: 50vw;
        --my: 50vh;
      }

      body {
        min-height: 100svh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-family: "Space Grotesk", sans-serif;
        background: #080808;
        color: #d4d4d4;
        overflow: hidden;
        -webkit-font-smoothing: antialiased;
      }

      /* Base custom cursor rule */
      @media (pointer: fine) {
        * { cursor: none !important; }
      }

      /* Custom cursor elements */
      .cursor-dot {
        position: fixed;
        top: 0; left: 0;
        width: 6px; height: 6px;
        background: #f0f0f0;
        border-radius: 50%;
        transform: translate(-50%, -50%);
        pointer-events: none;
        z-index: 9999;
        transition: opacity 0.3s;
      }

      .cursor-trail {
        position: fixed;
        top: 0; left: 0;
        width: 40px; height: 40px;
        border: 1px solid rgba(255, 255, 255, 0.25);
        border-radius: 50%;
        transform: translate(-50%, -50%);
        pointer-events: none;
        z-index: 9998;
        backdrop-filter: blur(0px); /* Initialize blur to allow transition */
        -webkit-backdrop-filter: blur(0px);
        transition: width 0.3s cubic-bezier(0.23, 1, 0.32, 1),
                    height 0.3s cubic-bezier(0.23, 1, 0.32, 1),
                    background 0.3s,
                    border-color 0.3s,
                    opacity 0.3s,
                    backdrop-filter 0.3s,
                    -webkit-backdrop-filter 0.3s;
      }

      .cursor-trail.hovering {
        width: 0px;
        height: 0px;
        opacity: 0;
      }

      .container {
        position: relative;
        z-index: 1;
        text-align: center;
        padding: 32px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 40px;
      }

      .name {
        font-family: "Instrument Serif", serif;
        font-weight: 400;
        font-size: clamp(2.8rem, 7vw, 5.2rem);
        line-height: 1.15;
        letter-spacing: -0.03em;
        color: #f0f0f0;
        opacity: 0;
        animation: clipReveal 1s cubic-bezier(0.23, 1, 0.32, 1) 0.2s both;
      }

      .role {
        font-size: 0.82rem;
        font-weight: 400;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: #555;
        margin-top: 12px;
        opacity: 0;
        animation: revealUp 0.8s cubic-bezier(0.23, 1, 0.32, 1) 0.7s both;
      }

      .divider {
        width: 40px;
        height: 1px;
        background: #2a2a2a;
        opacity: 0;
        animation: growLine 0.6s ease-out 1.1s both;
      }

      .status {
        font-size: 0.88rem;
        font-weight: 300;
        color: #666;
        letter-spacing: 0.04em;
        opacity: 0;
        animation: revealUp 0.8s cubic-bezier(0.23, 1, 0.32, 1) 1.4s both;
      }

      .status em {
        font-family: "Instrument Serif", serif;
        font-style: italic;
        color: #888;
        font-size: 1rem;
      }

      .links {
        display: flex;
        gap: 12px;
        justify-content: center;
        align-items: center;
        opacity: 0;
        animation: fadeScale 0.9s cubic-bezier(0.23, 1, 0.32, 1) 1.8s both;
      }

      .links a {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 10px 20px;
        border-radius: 999px;
        border: 1px solid #1a1a1a;
        color: #888;
        text-decoration: none;
        font-size: 0.84rem;
        font-weight: 400;
        letter-spacing: 0.02em;
        transition: color 0.3s, border-color 0.3s, background 0.3s, transform 0.3s;
      }

      .links a:hover {
        color: #f0f0f0;
        border-color: #444;
        background: rgba(255,255,255,0.04);
        transform: translateY(-2px);
      }

      .links a:focus-visible {
        outline: 1px solid #444;
        outline-offset: 2px;
      }

      .links svg {
        width: 16px;
        height: 16px;
        fill: currentColor;
        flex-shrink: 0;
      }

      .wave-bg {
        position: fixed;
        inset: 0;
        z-index: -1;
        pointer-events: none;
      }

      @media (max-width: 520px) {
        .container { gap: 32px; padding: 24px; }
        .links { flex-direction: column; gap: 10px; width: 100%; }
        .links a { justify-content: center; width: 100%; }
      }

      @media (pointer: coarse) {
        .cursor-dot, .cursor-trail { display: none !important; }
        .wave-bg { display: none; }
      }

      @media (prefers-reduced-motion: reduce) {
        * { transition: none !important; }
        .cursor-trail { display: none !important; }
        .wave-bg { display: none; }
      }
    </style>
  </head>
  <body>
    <canvas class="wave-bg" aria-hidden="true"></canvas>
    <div class="cursor-dot" aria-hidden="true"></div>
    <div class="cursor-trail" aria-hidden="true"></div>

    <div class="container">
      <header>
        <h1 class="name">Ivan Legchilov</h1>
        <p class="role">UX / UI Designer</p>
      </header>

      <div class="divider" aria-hidden="true"></div>

      <p class="status">Interactive website <em>coming soon</em></p>

      <nav class="links">
        <a href="https://www.linkedin.com/in/o1ls/" target="_blank" rel="noreferrer">
          <svg viewBox="0 0 24 24"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>

          <svg viewBox="0 0 24 24"><path d="M6.938 4.503c.702 0 1.34.06 1.92.188.577.13 1.07.33 1.485.61.41.28.733.65.96 1.12.225.47.34 1.05.34 1.73 0 .74-.17 1.36-.507 1.86-.338.5-.837.9-1.502 1.22.906.26 1.576.72 2.022 1.37.448.66.665 1.45.665 2.36 0 .75-.13 1.39-.41 1.93-.28.55-.67 1-1.16 1.35-.48.348-1.05.6-1.67.767-.63.165-1.27.25-1.95.25H0V4.51h6.938v-.007zM6.545 10.16c.6 0 1.09-.16 1.47-.477.38-.316.57-.75.57-1.29 0-.31-.06-.57-.174-.78a1.47 1.47 0 00-.47-.52 1.93 1.93 0 00-.68-.3 3.16 3.16 0 00-.82-.1H3.2v3.47h3.345zm.19 5.63c.31 0 .6-.03.88-.1.28-.07.52-.18.73-.34.2-.16.37-.37.48-.63.12-.26.18-.58.18-.96 0-.75-.22-1.29-.66-1.61-.44-.32-.99-.48-1.67-.48H3.2v4.12h3.535zM15.834 15.15c.45.45 1.1.677 1.95.677.61 0 1.13-.15 1.57-.46.44-.31.72-.64.84-.99h2.78c-.45 1.34-1.12 2.305-2.01 2.9-.89.6-1.97.89-3.22.89-.87 0-1.65-.14-2.34-.43a5.14 5.14 0 01-1.8-1.22 5.65 5.65 0 01-1.15-1.86c-.27-.72-.4-1.51-.4-2.37 0-.84.14-1.62.41-2.33.28-.72.67-1.33 1.18-1.86a5.32 5.32 0 011.81-1.23c.7-.3 1.47-.45 2.3-.45.91 0 1.72.17 2.43.52.71.35 1.3.84 1.78 1.49.48.64.83 1.39 1.05 2.27.22.87.3 1.82.24 2.84h-8.26c.04.94.34 1.7.79 2.15zm3.41-5.4c-.36-.39-.98-.59-1.76-.59-.52 0-.95.09-1.29.26-.34.18-.61.39-.82.64-.2.25-.34.52-.41.81-.08.28-.12.54-.14.77h5.17c-.1-.86-.39-1.5-.75-1.89zm-2.8-4.86h5.42v1.32h-5.42V4.89z"/></svg>
          Behance
        </a>
        <a href="https://drive.google.com/file/d/1VtjgxgVY60JA-nO7s712u_z9lcKpUVUk/view" target="_blank" rel="noreferrer">
          <svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm4 18H6V4h7v5h5v11z"/></svg>
          CV
        </a>
      </nav>
    </div>

    <script>
      (() => {
        if (window.matchMedia("(prefers-reduced-motion: reduce)").matches) return;
        if (window.matchMedia("(pointer: coarse)").matches) return;

        const root = document.documentElement;
        const dot = document.querySelector(".cursor-dot");
        const trail = document.querySelector(".cursor-trail");
        const links = document.querySelectorAll("a");

        let targetX = window.innerWidth / 2;
        let targetY = window.innerHeight / 2;
        let currentX = targetX;
        let currentY = targetY;

        // hide cursors until first move to prevent corner spawn
        if (dot && trail) {
          dot.style.opacity = 0;
          trail.style.opacity = 0;
        }

        let hasMoved = false;

        document.addEventListener("pointermove", (e) => {
          targetX = e.clientX;
          targetY = e.clientY;
          
          if (!hasMoved && dot && trail) {
            hasMoved = true;
            currentX = targetX;
            currentY = targetY;
            dot.style.left = targetX + "px";
            dot.style.top = targetY + "px";
            trail.style.left = targetX + "px";
            trail.style.top = targetY + "px";
            dot.style.opacity = 1;
            trail.style.opacity = 1;
          }
          
          if (dot) {
            dot.style.left = targetX + "px";
            dot.style.top = targetY + "px";
          }
        });

        links.forEach(link => {
          link.addEventListener("mouseenter", () => trail?.classList.add("hovering"));
          link.addEventListener("mouseleave", () => trail?.classList.remove("hovering"));
        });

        const lerp = (a, b, t) => a + (b - a) * t;

        /* ---- webgl fluid wave canvas ---- */
        const canvas = document.querySelector(".wave-bg");
        const gl = canvas.getContext("webgl");

        const vs = gl.createShader(gl.VERTEX_SHADER);
        gl.shaderSource(vs, `attribute vec2 p;void main(){gl_Position=vec4(p,0.,1.);}`);
        gl.compileShader(vs);

        const fs = gl.createShader(gl.FRAGMENT_SHADER);
        gl.shaderSource(fs, `
          precision highp float;
          uniform vec2 u_res;
          uniform float u_time;
          uniform vec2 u_mouse;

          // random hash
          float hash12(vec2 p) {
            vec3 p3  = fract(vec3(p.xyx) * .1031);
            p3 += dot(p3, p3.yzx + 33.33);
            return fract((p3.x + p3.y) * p3.z);
          }

          // smooth noise
          float noise(vec2 p) {
            vec2 i = floor(p);
            vec2 f = fract(p);
            f = f * f * (3.0 - 2.0 * f);
            float a = hash12(i);
            float b = hash12(i + vec2(1.0, 0.0));
            float c = hash12(i + vec2(0.0, 1.0));
            float d = hash12(i + vec2(1.0, 1.0));
            return mix(mix(a, b, f.x), mix(c, d, f.x), f.y);
          }

          // fractal brownian motion
          float fbm(vec2 p) {
            float f = 0.0;
            float amp = 0.5;
            for(int i = 0; i < 4; i++) {
              f += amp * noise(p);
              p *= 2.0;
              amp *= 0.5;
            }
            return f;
          }

          void main() {
            vec2 uv = gl_FragCoord.xy / u_res.xy;
            float aspect = u_res.x / u_res.y;
            uv.x *= aspect;

            vec2 mouse = u_mouse / u_res.xy;
            mouse.x *= aspect;

            // distance to mouse
            float dist = length(uv - mouse);
            
            // soft displacement
            vec2 disp = normalize(uv - mouse) * exp(-dist * 8.0) * 0.05;

            // fluid waves
            vec2 p = uv * 2.0 + disp;
            p.x += u_time * 0.04;
            p.y -= u_time * 0.03;

            float n = fbm(p + fbm(p * 1.5 - u_time * 0.05));

            // premium dark colors
            vec3 col1 = vec3(0.02, 0.02, 0.02);
            vec3 col2 = vec3(0.08, 0.08, 0.09) + (exp(-dist * 4.0) * 0.06);
            vec3 bg = mix(col1, col2, n);

            // dynamic grain
            float grain = (hash12(gl_FragCoord.xy + u_time) - 0.5) * 0.04;

            gl_FragColor = vec4(bg + grain, 1.0);
          }
        `);
        gl.compileShader(fs);

        const prog = gl.createProgram();
        gl.attachShader(prog, vs);
        gl.attachShader(prog, fs);
        gl.linkProgram(prog);
        gl.useProgram(prog);

        const buf = gl.createBuffer();
        gl.bindBuffer(gl.ARRAY_BUFFER, buf);
        gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);

        const pos = gl.getAttribLocation(prog, "p");
        gl.enableVertexAttribArray(pos);
        gl.vertexAttribPointer(pos, 2, gl.FLOAT, false, 0, 0);

        const uRes = gl.getUniformLocation(prog, "u_res");
        const uTime = gl.getUniformLocation(prog, "u_time");
        const uMouse = gl.getUniformLocation(prog, "u_mouse");

        function resize() {
          canvas.width = window.innerWidth;
          canvas.height = window.innerHeight;
          gl.viewport(0, 0, canvas.width, canvas.height);
          gl.uniform2f(uRes, canvas.width, canvas.height);
        }
        resize();
        window.addEventListener("resize", resize);

        let time = 0;
        function tick() {
          currentX = lerp(currentX, targetX, 0.12);
          currentY = lerp(currentY, targetY, 0.12);

          if (trail && hasMoved) {
            trail.style.left = currentX + "px";
            trail.style.top = currentY + "px";
          }

          time += 0.01;
          gl.uniform1f(uTime, time);
          gl.uniform2f(uMouse, currentX, canvas.height - currentY);
          gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

          requestAnimationFrame(tick);
        }

        requestAnimationFrame(tick);
      })();
    </script>
  </body>
